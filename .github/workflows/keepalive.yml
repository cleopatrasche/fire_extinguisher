# .github/workflows/keepalive.yml
name: Supabase Keepalive

on:
  schedule:
    - cron: "37 0 * * 1,4"   # 매주 월·목 00:37 UTC (≈ KST 09:37). 7일보다 짧으면 충분
  workflow_dispatch:          # 깃허브에서 수동 실행 버튼

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/extinguishers?select=ext_id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")
          echo "HTTP $code"
          # 200/206 이면 성공 (RLS로 결과가 비어도 DB는 깨어납니다)
          if [ "$code" != "200" ] && [ "$code" != "206" ]; then exit 1; fi
